<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  @keyframes gr-caret { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes gr-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes gr-scan { 0% { background-position: 0 0; } 100% { background-position: 0 6px; } }
  @keyframes gr-twinkle { 0%, 100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes gr-shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(3px); } }
</style>
</helmet>
<div style="position:relative; width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; font-family:'VT323', monospace; background:linear-gradient(135deg, #16c79a 0%, #2f7fd6 38%, #6a4bd6 70%, #7a3fd6 100%); overflow:hidden;">

  <!-- grid overlay -->
  <div style="position:absolute; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px); background-size:26px 26px; mix-blend-mode:overlay;"></div>
  <!-- scanlines -->
  <div style="position:absolute; inset:0; pointer-events:none; opacity:0.35; background:repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px); animation:gr-scan 1.2s linear infinite;"></div>
  <!-- corner twinkles -->
  <div style="position:absolute; top:9%; left:14%; color:#fff; font-size:30px; animation:gr-twinkle 2.6s ease-in-out infinite; pointer-events:none;">✦</div>
  <div style="position:absolute; top:20%; right:16%; color:#bdf6ec; font-size:20px; animation:gr-twinkle 3.1s ease-in-out .6s infinite; pointer-events:none;">✦</div>
  <div style="position:absolute; bottom:16%; left:20%; color:#ffd9ec; font-size:22px; animation:gr-twinkle 2.9s ease-in-out 1.1s infinite; pointer-events:none;">✦</div>
  <div style="position:absolute; bottom:24%; right:12%; color:#fff; font-size:16px; animation:gr-twinkle 2.4s ease-in-out .3s infinite; pointer-events:none;">✦</div>

  <!-- main card -->
  <div style="position:relative; width:100%; max-width:680px; display:flex; flex-direction:column; align-items:center; gap:34px; z-index:2;">

    <!-- title -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px; animation:gr-float 5s ease-in-out infinite;">
      <h1 style="margin:0; font-family:'Press Start 2P', monospace; font-size:42px; line-height:1.18; text-align:center; color:#9af7e2; text-shadow:4px 4px 0 #7a3fd6, 4px 4px 0 #7a3fd6, 0 0 18px rgba(154,247,226,0.55); letter-spacing:1px; word-spacing:-12px;">ENTER<br>YOUR NAME</h1>
    </div>
    <div style="font-family:'VT323', monospace; font-size:21px; letter-spacing:2px; color:rgba(255,255,255,0.82); text-align:center; margin-top:-18px;">Claim your spot on the leaderboard</div>

    <!-- CRT input console -->
    <div style="width:100%; max-width:560px; padding:22px; border-radius:8px; background:linear-gradient(180deg, rgba(20,12,40,0.62), rgba(12,8,30,0.74)); border:2px solid rgba(173,255,236,0.55); box-shadow:0 0 0 4px rgba(0,0,0,0.25), 0 0 26px rgba(120,255,230,0.35), inset 0 0 30px rgba(120,90,220,0.25);">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <span style="font-family:'Press Start 2P', monospace; font-size:10px; letter-spacing:2px; color:#9af7e2;">PLAYER 1</span>
        <span style="font-family:'Press Start 2P', monospace; font-size:10px; letter-spacing:2px; color:{{ countColor }};">{{ count }}/12</span>
      </div>

      <div onClick="{{ focusInput }}" style="position:relative; display:flex; align-items:center; gap:10px; padding:16px 18px; border-radius:6px; background:#0b0a1e; border:2px solid {{ fieldBorder }}; cursor:text; box-shadow:inset 0 0 18px rgba(0,0,0,0.6); animation:{{ shakeAnim }};">
        <span style="font-family:'VT323', monospace; font-size:30px; color:#ff5c8a; line-height:1;">&gt;</span>
        <span style="font-family:'Press Start 2P', monospace; font-size:18px; letter-spacing:2px; color:#f3f0ff; text-shadow:0 0 8px rgba(243,240,255,0.45); white-space:nowrap; overflow:hidden;">{{ display }}</span>
        <span style="display:{{ caretDisplay }}; width:13px; height:24px; background:#9af7e2; box-shadow:0 0 10px rgba(154,247,226,0.8); animation:gr-caret 1s steps(1) infinite;"></span>
        <input ref="{{ inputRef }}" value="{{ name }}" onInput="{{ onInput }}" onKeyDown="{{ onKeyDown }}" maxLength="12" placeholder="" style="position:absolute; inset:0; opacity:0; width:100%; height:100%; border:none; cursor:text;" />
      </div>

      <div style="margin-top:12px; font-family:'VT323', monospace; font-size:18px; letter-spacing:1px; color:rgba(255,255,255,0.55); text-align:center;">{{ hint }}</div>
    </div>

    <!-- actions -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:560px;">
      <button onClick="{{ onStart }}" disabled="{{ startDisabled }}" style="width:100%; padding:20px; border:3px solid #0b0a1e; border-radius:4px; background:{{ startBg }}; color:#1a160a; font-family:'Press Start 2P', monospace; font-size:18px; letter-spacing:2px; cursor:{{ startCursor }}; box-shadow:6px 6px 0 rgba(11,10,30,0.55); transition:transform .08s ease, box-shadow .08s ease; opacity:{{ startOpacity }};" style-hover="{{ startHover }}" style-active="{{ startActive }}">START ▶</button>

      <button onClick="{{ onSkip }}" style="background:none; border:none; padding:8px 10px; font-family:'VT323', monospace; font-size:22px; letter-spacing:3px; color:rgba(255,255,255,0.78); cursor:pointer; text-decoration:underline; text-underline-offset:5px; text-decoration-color:rgba(255,255,255,0.35);" style-hover="{ color: '#fff', textDecorationColor: 'rgba(255,255,255,0.9)' }">SKIP — play as GUEST →</button>
    </div>

    <div style="font-family:'VT323', monospace; font-size:16px; letter-spacing:3px; color:rgba(255,255,255,0.45);">KEYS: D F J K</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { name: "", shake: false, started: null };

  setRef = (el) => { this.inputEl = el; };

  componentDidMount() {
    if (this.inputEl) { try { this.inputEl.focus(); } catch (e) {} }
  }

  clean(v) {
    return (v || "").toUpperCase().replace(/[^A-Z0-9 _-]/g, "").slice(0, 12);
  }

  onInput = (e) => {
    this.setState({ name: this.clean(e.target.value) });
  };

  onKeyDown = (e) => {
    if (e.key === "Enter") { this.submit(); }
  };

  submit() {
    const n = this.state.name.trim();
    if (!n) {
      this.setState({ shake: true });
      setTimeout(() => this.setState({ shake: false }), 450);
      if (this.inputEl) { try { this.inputEl.focus(); } catch (e) {} }
      return;
    }
    try { localStorage.setItem("glowrush_player", n); } catch (e) {}
    this.setState({ started: n });
  }

  skip = () => {
    try { localStorage.setItem("glowrush_player", "GUEST"); } catch (e) {}
    this.setState({ started: "GUEST" });
  };

  focusInput = () => { if (this.inputEl) { try { this.inputEl.focus(); } catch (e) {} } };

  renderVals() {
    const name = this.state.name;
    const count = name.length;
    const hasName = name.trim().length > 0;
    const countColor = count >= 11 ? "#ff5c8a" : "#9af7e2";

    let hint = "Letters & numbers · up to 12 characters";
    if (this.state.started === "GUEST") hint = "Starting as GUEST…";
    else if (this.state.started) hint = "Welcome, " + this.state.started + "! Loading…";
    else if (hasName) hint = "Press ENTER or START to lock it in";

    return {
      name,
      count,
      countColor,
      display: name || " ",
      caretDisplay: count >= 12 ? "none" : "inline-block",
      hint,
      inputRef: this.setRef,
      onInput: this.onInput,
      onKeyDown: this.onKeyDown,
      onStart: () => this.submit(),
      onSkip: this.skip,
      focusInput: this.focusInput,
      fieldBorder: this.state.shake ? "#ff5c8a" : "rgba(154,247,226,0.6)",
      shakeAnim: this.state.shake ? "gr-shake 0.45s ease" : "none",
      startDisabled: false,
      startBg: hasName ? "#ffe600" : "rgba(255,230,0,0.45)",
      startOpacity: hasName ? "1" : "0.7",
      startCursor: "pointer",
      startHover: hasName ? { transform: "translate(2px,2px)", boxShadow: "4px 4px 0 rgba(11,10,30,0.55)" } : {},
      startActive: hasName ? { transform: "translate(6px,6px)", boxShadow: "0 0 0 rgba(11,10,30,0.55)" } : {},
    };
  }
}
</script>
</body>
</html>
