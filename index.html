<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GLOWRUSH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Home Screen -->
  <div id="home-screen" class="screen active">
    <div class="grid-overlay"></div>
    <div class="home-content">
      <h1 class="title">GLOWRUSH</h1>
      <div class="tv-container">
        <img src="assets/tv-idol.png" alt="VEIL K-pop group" class="tv-image">
      </div>
      <button id="btn-play" class="btn-play">PLAY ▶</button>
      <p class="keys-hint desktop-only">KEYS: D F J K</p>
      <p class="keys-hint mobile-only">TAP THE LANES TO PLAY</p>
    </div>
  </div>

  <!-- Member Selection Screen -->
  <div id="select-screen" class="screen">
    <div class="grid-overlay"></div>
    <div class="select-content">
      <div class="select-header">
        <h2 class="select-title">SELECT MEMBER</h2>
        <img src="assets/veil-logo.png" alt="VEIL" class="veil-logo">
      </div>
      <div class="member-grid">
        <div class="member-card" data-member="nova">
          <div class="card-shadow"></div>
          <div class="card-portrait">
            <img src="assets/nova.png" alt="NOVA">
          </div>
          <div class="card-label"><span>NOVA</span></div>
        </div>
        <div class="member-card" data-member="lyra">
          <div class="card-shadow"></div>
          <div class="card-portrait">
            <img src="assets/lyra.png" alt="LYRA">
          </div>
          <div class="card-label"><span>LYRA</span></div>
        </div>
        <div class="member-card" data-member="echo">
          <div class="card-shadow"></div>
          <div class="card-portrait">
            <img src="assets/echo.png" alt="ECHO">
          </div>
          <div class="card-label"><span>ECHO</span></div>
        </div>
        <div class="member-card" data-member="stella">
          <div class="card-shadow"></div>
          <div class="card-portrait">
            <img src="assets/stella.png" alt="STELLA">
          </div>
          <div class="card-label"><span>STELLA</span></div>
        </div>
      </div>
      <button id="btn-start" class="btn-play btn-disabled">PLAY ▶</button>
    </div>
  </div>

  <!-- Game Screen (Canvas) -->
  <div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="screen">
    <div class="results-content">
      <h2 class="results-title">WAVE COMPLETE</h2>
      <div class="results-song" id="result-song-name"></div>
      <div class="results-grid">
        <div class="stat-box">
          <span class="stat-value" id="result-score">0</span>
          <span class="stat-label">SCORE</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="result-perfect">0</span>
          <span class="stat-label">PERFECT HITS</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="result-accuracy">0%</span>
          <span class="stat-label">ACCURACY %</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="result-combo">0</span>
          <span class="stat-label">MAX COMBO</span>
        </div>
      </div>
      <button id="btn-replay" class="btn-play">PLAY AGAIN</button>
      <button id="btn-home" class="btn-secondary">HOME</button>
    </div>
  </div>

  <!-- Fail Screen -->
  <div id="fail-screen" class="screen">
    <div class="fail-content">
      <h2 class="fail-title">FAILED!</h2>
      <p class="fail-sub">Don't give up, fan!</p>
      <div class="fail-score">SCORE: <span id="fail-score-val">0</span></div>
      <button id="btn-revive" class="btn-play">
        <span class="popular-tag">POPULAR</span>
        REVIVE $0.99
      </button>
      <button id="btn-quit" class="btn-secondary">QUIT</button>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
