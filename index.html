
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GLOWRUSH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCKfSzHyDr-e7laJuZLevQcLQsPNlSYnAE",
      authDomain: "glowrush.firebaseapp.com",
      projectId: "glowrush",
      storageBucket: "glowrush.firebasestorage.app",
      messagingSenderId: "536924674667",
      appId: "1:536924674667:web:6bcc9faeab783d4a98af2e"
    });

    const db = getFirestore(app, 'glowrush-db');
    window.fbDB = { db, collection, addDoc, query, orderBy, limit, getDocs };
  </script>
</head>
<body>

  <!-- Home Screen -->
  <div id="home-screen" class="screen active">
    <div class="grid-overlay"></div>
    <div class="home-content">
      <h1 class="title">GLOWRUSH</h1>
      <div class="tv-container">
        <img src="assets/tv-idol.png" alt="VEIL K-pop group" class="tv-image">
      </div>
      <button id="btn-play" class="btn-play">PLAY ▶</button>
      <div class="keyboard-hint desktop-only">
        <span class="key-cap">D</span>
        <span class="key-cap">F</span>
        <span class="key-cap">J</span>
        <span class="key-cap">K</span>
      </div>
      <p class="keys-hint mobile-only">TAP THE LANES TO PLAY</p>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <img src="assets/game-bg.png" alt="" class="game-bg">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Post-Game Screen (score + leaderboard + name entry) -->
  <div id="postgame-screen" class="screen">
    <img src="assets/veil-group.png" alt="" class="pg-bg">
    <div class="ne-grid"></div>
    <div class="ne-scan"></div>

    <div class="pg-scroll">
      <div class="ne-column">
        <div class="pg-header">
          <div class="ne-float">
            <h1 class="ne-title" id="pg-title">WAVE COMPLETE</h1>
          </div>
          <p class="pg-song" id="pg-song">NEON FREQUENCY — VEIL</p>
          <p class="pg-stats-inline">
            SCORE <span id="pg-score">0</span> · ACCURACY <span id="pg-accuracy">0%</span> · COMBO <span id="pg-combo">0</span>
          </p>
        </div>

        <!-- Leaderboard -->
        <div class="pg-leaderboard">
          <h3 class="pg-lb-title">LEADERBOARD</h3>
          <div id="pg-lb-list"></div>
          <button class="pg-lb-expand" id="pg-lb-expand" style="display:none">EXPAND TO VIEW FULL LIST ▼</button>
        </div>

        <!-- Name entry -->
        <div class="ne-section">
          <h3 class="pg-lb-title">ADD YOUR NAME TO LEADERBOARD</h3>
          <div class="ne-field" id="ne-field">
            <span class="ne-prompt">&gt;</span>
            <span class="ne-display" id="ne-display">&nbsp;</span>
            <span class="ne-caret" id="ne-caret"></span>
            <input type="text" id="ne-input" maxlength="8" autocomplete="off" autocapitalize="off" spellcheck="false">
            <button id="btn-save" class="ne-save">SAVE</button>
          </div>
          <span class="ne-counter" id="ne-counter">0/8 characters limit</span>
        </div>

        <div class="ne-actions">
          <button id="btn-replay" class="btn-play">PLAY AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer"> © 2026 Nayeon Lee</footer>

  <script src="js/game.js"></script>
</body>
</html>
